server {
    listen 8080;
    server_name localhost;

    root /var/www/devops-lab;
    index index.html;

    access_log /var/log/nginx/devops-lab-access.log;
    error_log /var/log/nginx/devops-lab-error.log;

    location / {
        try_files $uri $uri/ =404;
    }

    location /health {
        default_type text/plain;
        return 200 "ok\n";
    }
}